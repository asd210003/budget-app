<h2 class="flex justify-center font-dm text-white mt-15 font-bold text-5xl ">Create Your Account</h2>
<div class="flex justify-center mt-10 ">
    <div class="bg-gradient-to-t from-sky-500 to-sky-400 rounded-2xl p-8  w-full max-w-md shadow-lg">
        <h2 class="text-2xl font-dm text-white text-center cursor-default mb-4">Create</h2>

        <form class="space-y-6" [formGroup]="formValid">
            <div>
                <label class="block text-sm text-white mb-1 ml-2 py-1">First Name</label>
                <input
                    type="text"
                    autofocus
                    formControlName="firstName"
                    spellcheck="false"
                    class="w-full border-2 border-sky-300 rounded-xl px-3 py-2
                    focus:outline-none focus:ring-3 focus:ring-sky-100 placeholder-sky-300 text-white
                    transition duration-300 ease-in-out"
                    placeholder="first name"
                >
            </div>

            <div>
                <label class="block text-sm text-white mb-1 ml-2 py-1">Username</label>
                <input
                    type="text"
                    formControlName="username"
                    spellcheck="false"
                    class="w-full border-2 border-sky-300 rounded-xl px-3 py-2
                    focus:outline-none focus:ring-3 focus:ring-sky-100 placeholder-sky-300 text-white
                    transition duration-300 ease-in-out"
                    placeholder="username"
                >
            </div>

            <div>
                <label class="block text-sm text-white mb-1 ml-2 py-1">Email</label>
                <input
                    type="email"
                    formControlName="email"
                    spellcheck="false"
                    class="w-full border-2 border-sky-300 rounded-xl px-3 py-2
                    focus:outline-none focus:ring-3 focus:ring-sky-100 placeholder-sky-300 text-white
                    transition duration-300 ease-in-out"
                    placeholder="email"
                >
            </div>

            <div>
                <label class="block text-sm text-white mb-1 ml-2 py-1">Password</label>
                <input
                    type="password"
                    formControlName="password"
                    spellcheck="false"
                    class="w-full border-2 border-sky-300 rounded-xl px-3 py-2
                    focus:outline-none focus:ring-3 focus:ring-sky-100 placeholder-sky-300 text-white
                    transition duration-300 ease-in-out"
                    placeholder="password"
                >
            </div>

            <div>
                <label class="block text-sm text-white mb-1 ml-2 py-1">Confirm Password</label>
                <input
                    type="password"
                    spellcheck="false"
                    class="w-full border-2 border-sky-300 rounded-xl px-3 py-2
                    focus:outline-none focus:ring-3 focus:ring-sky-100 placeholder-sky-300 text-white
                    transition duration-300 ease-in-out"
                    placeholder="confirm password"
                >
            </div>

            <button
                routerLink="/home"
                [disabled]="formValid.invalid"
                class="w-full py-2 text-xl text-white font-bold rounded-lg mt-6 shadow-sm
                    border-2 border-sky-300
                    hover:scale-103 transform transition-transform duration-200">
            Submit
            </button>
        </form>
    </div>
</div>

<div class="flex justify-center mt-10">
    <button
        routerLink=""
        class="flex justify-center text-white text-xl font-bold
        rounded-lg px-2 py-1
        hover:ring-3 transition-all duration-250"
        >Back
    </button>
</div>
